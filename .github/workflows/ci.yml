name: CI

on:
  push:
  pull_request:

# Cancel an in-flight run when a newer commit lands on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only token: this workflow never writes to the repo or calls any service.
permissions:
  contents: read

# Actions are pinned to full commit SHAs (the trailing comment names the
# release), so a moved or compromised tag cannot change what runs here.

jobs:
  # The gate. Dependency-free, no secrets, no network: just the stdlib suite
  # across the supported Python range. Keep it green.
  tests:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      # Belt and braces: the suite seals itself against the host git config
      # (GIT_CONFIG_GLOBAL=/dev/null and its own inline identities), but a
      # sane global identity and default branch keep any future test that
      # forgets the seal from failing only on a fresh runner.
      - name: Configure git
        run: |
          git config --global user.email "ci@legwork.invalid"
          git config --global user.name "legwork ci"
          git config --global init.defaultBranch main

      - name: Run the stdlib test suite
        run: python3 -m unittest discover -s tests

  # Cheap blocking syntax checks for everything the Python suite cannot
  # import: the n8n workflow JSONs, the bash installer + hooks, and the
  # reviewer build node. Seconds to run, and a truncated JSON or an
  # unparseable hook should gate, not advise.
  syntax:
    name: syntax (json, bash, node)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Parse the n8n workflow JSONs
        run: |
          python3 -m json.tool suite/alerts/n8n-alerts-workflow.json > /dev/null
          python3 -m json.tool suite/reply-capture/n8n-reply-capture-workflow.json > /dev/null
          python3 -m json.tool suite/reviewer/n8n-review-workflow.json > /dev/null

      - name: Bash syntax (installer + hooks)
        run: |
          bash -n install.sh
          bash -n core/session_start_hook.sh
          bash -n core/session_end_hook.sh

      - name: Node syntax (reviewer build node)
        run: node --check suite/reviewer/n8n-build-node.js

  # The strip gate for the lite artifact. core/ is the complete level-1
  # product (common helpers, dashboard builder, hooks, commands, skill, and
  # the plugin manifest), and suite/ imports from core, never the reverse.
  # This job proves it: core/ is copied OUT of the checkout (no suite/, no
  # scripts/, no tests/) and then imported and run. If core/ ever grows an
  # import or path reference into suite/, this fails. The same core/ is the
  # published Claude Code plugin (its manifest lives at
  # core/.claude-plugin/plugin.json, sourced by the repo-root marketplace as
  # ./core), so this gate also asserts the manifests are well-formed and that
  # the stripped, suite-free copy is itself a complete plugin. Blocking, like
  # the test gate.
  lite:
    name: lite (core/ alone)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Against the full checkout: the manifests parse, source ./core, expose
      # exactly the level-1 command + skill surface, and reach for no suite/
      # code. Stdlib only; runs in the main suite too.
      - name: Validate the plugin + marketplace manifests
        run: python3 -m unittest tests.test_plugin_manifest -v

      - name: Strip to core/ and a sample queue
        run: |
          mkdir -p "$RUNNER_TEMP/lite/projects"
          cp -R core "$RUNNER_TEMP/lite/core"
          cp examples/projects/*.md "$RUNNER_TEMP/lite/projects/"

      - name: Imports with zero suite/ code present
        working-directory: ${{ runner.temp }}/lite
        run: |
          python3 -c "import sys; sys.path.insert(0, 'core'); \
            import legwork_common, build_dashboard"
          bash -n core/session_start_hook.sh core/session_end_hook.sh
          # The stripped copy carries its own plugin manifest and no suite/:
          # core/ alone is an installable plugin.
          test -f core/.claude-plugin/plugin.json
          python3 -c "import json; m=json.load(open('core/.claude-plugin/plugin.json')); assert m['name'] == 'legwork', m"
          test ! -e suite && test ! -e scripts

      - name: The lite loop runs end to end
        working-directory: ${{ runner.temp }}/lite
        run: |
          # The builder alone, then the webhook-less SessionEnd hook, which
          # must rebuild the dashboard (the level-1 payoff) and log it.
          # LEGWORK_WEBHOOK_URL is stripped explicitly so the hook takes the
          # lite branch even when this recipe is replayed on a dev machine
          # whose shell exports a real webhook.
          python3 core/build_dashboard.py
          test -s dashboard/index.html
          rm -rf dashboard
          printf '{"session_id":"ci-lite","cwd":"%s","reason":"exit"}' "$PWD" \
            | env -u LEGWORK_WEBHOOK_URL LEGWORK_DIR="$PWD" \
              bash core/session_end_hook.sh
          test -s dashboard/index.html
          grep "rebuilt dashboard" hook.log

  # Dev-only, advisory. continue-on-error keeps it off the critical path: it
  # surfaces lint and byte-compile signal without ever blocking the gate above.
  quality:
    name: quality (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      # Byte-compile everything: a cheap, dependency-free syntax gate that
      # catches breakage the test discovery might not import.
      - name: Byte-compile
        run: python3 -m py_compile core/*.py suite/*.py scripts/*.py tests/*.py

      # ruff is the one dev tool we reach for. It is not a runtime dependency
      # of legwork and never runs in the gate above.
      - name: Ruff (advisory)
        run: |
          python3 -m pip install --quiet "ruff==0.6.9"
          ruff check --output-format=github .
